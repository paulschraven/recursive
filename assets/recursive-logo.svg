<svg width="100%" viewBox="0 0 690 690" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Recursive — ouroboros arrow variant</title>
  <desc>Square monochrome icon with a circular arrow looping back into its own tail.</desc>

  <defs>
    <marker id="rhead" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#f2efe8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="680" height="680" fill="#0e0e0e"/>

  <circle cx="340" cy="300" r="130"
          fill="none"
          stroke="#f2efe8"
          stroke-width="14"
          stroke-linecap="butt"
          stroke-dasharray="775 40"
          stroke-dashoffset="20"
          transform="rotate(-90 340 300)"
          marker-end="url(#rhead)"/>

  <text x="340" y="540"
        text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', Menlo, monospace"
        font-size="56"
        font-weight="500"
        fill="#f2efe8"
        letter-spacing="2">recursive</text>
</svg>
